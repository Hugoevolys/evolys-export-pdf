services:
  - type: web
    name: chasseur-immo-estimation-api
    runtime: docker
    plan: starter            # le free tier s'endort ; starter recommande pour Chromium
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # a renseigner dans le dashboard Render
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: CORS_ORIGIN
        sync: false          # ex. https://estimation-loyer.netlify.app
      - key: PORT
        value: 3001
